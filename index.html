<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flewsoft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    header p {
      margin-top: 0.6rem;
      color: #8b90a0;
      font-size: 1.05rem;
    }

    .apps {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 700px;
      width: 100%;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 14px;
      padding: 2rem 2.2rem;
      flex: 1 1 260px;
      max-width: 320px;
    }

    .card .icon {
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.95rem;
      color: #8b90a0;
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    .badge {
      display: inline-block;
      background: #22263a;
      border: 1px solid #3a3f58;
      color: #7c83ff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }

    footer {
      margin-top: 3.5rem;
      color: #4a4f62;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Flewsoft</h1>
    <p>Simple apps for everyday things.</p>
  </header>

  <div class="apps">
    <div class="card">
      <div class="icon">&#127939;</div>
      <h2>RunCalc</h2>
      <p>A workout companion for tracking runs, calculating pace, and hitting your training goals.</p>
      <span class="badge">Coming Soon</span>
    </div>

    <div class="card">
      <div class="icon">&#127807;</div>
      <h2>Gardener</h2>
      <p>A garden tracking app to plan your plots, log plantings, and keep your garden growing strong.</p>
      <span class="badge">Coming Soon</span>
    </div>
  </div>

  <footer>&copy; 2026 Flewsoft</footer>

</body>
</html>
